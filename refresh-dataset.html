<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Đang làm mới dữ liệu Power BI...</title>
  <!-- 
    =====================================================================
    POWER BI REFRESH CLIENT - VERSION 2.1.1 (FIXED)
    
    MAJOR FIXES:
    ✅ Fixed "Illegal return statement" error
    ✅ Changed endpoint from CheckRefreshStatus to GetStatus (Azure Functions compatible)
    ✅ Improved error handling for Azure Functions responses
    ✅ Better CORS and connectivity detection
    
    DEVELOPER NOTES:
    1. File này chứa các cấu hình kết nối API quan trọng tại biến globalParams.
    2. KHÔNG THAY ĐỔI apiBaseUrl trừ khi bạn biết chính xác mình đang làm gì.
    3. Khi deploy, hãy sử dụng URL API phù hợp với môi trường của bạn.
    4. Phần cấu hình URL được đánh dấu với "IMPORTANT" comment.
    
    =====================================================================
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 50% 50%, #171936 0%, #090a14 100%);
      color: #f1f3f9;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .dashboard-container {
      width: 100%;
      max-width: 600px;
      margin: auto;
    }

    .dashboard-card {
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      background-color: rgba(23, 25, 54, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    #title {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      font-size: 1.8em;
      margin-top: 0;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    #status {
      font-size: 1.25em;
      font-weight: 600;
      margin-top: 24px;
      color: #ffffff;
      transition: all 0.3s ease;
    }

    #message {
      font-size: 0.95em;
      margin-top: 12px;
      color: #9ea2c0;
      font-weight: 400;
      line-height: 1.5;
    }

    /* Beautiful Conic Gradient Spinner */
    .loader {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 30%, #00f2fe 100%);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
      mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
      animation: spin 1s linear infinite;
      margin: 32px auto;
      filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.4));
    }

    #timer {
      margin-top: 16px;
      font-size: 0.9em;
      color: #a0aec0;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    /* Progress Bar */
    .progress-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
      margin: 28px 0 12px 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .progress-bar {
      background: linear-gradient(90deg, #00f2fe, #4facfe);
      width: 0%;
      height: 100%;
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 12px rgba(0, 242, 254, 0.4);
    }

    /* Form Styles */
    #paramForm {
      text-align: left;
      margin-top: 10px;
    }

    #paramForm h3 {
      font-size: 1.25em;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ffffff;
      border-left: 4px solid #00f2fe;
      padding-left: 10px;
      line-height: 1.2;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      margin-bottom: 6px;
      color: #a0aec0;
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #ffffff;
      padding: 12px 16px;
      width: 100%;
      transition: all 0.3s ease;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 0.95em;
    }

    .form-group input:focus {
      border-color: #00f2fe;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);
      outline: none;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      font-weight: 700;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      padding: 12px 24px;
      font-size: 0.95em;
      line-height: 1.5;
      border-radius: 10px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    .btn-info {
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      color: #0c0e1a;
      border: none;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
      width: 100%;
      margin-top: 12px;
    }

    .btn-info:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0, 242, 254, 0.55);
      filter: brightness(1.1);
    }

    #toggleDetails {
      width: auto;
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.05);
      color: #f1f3f9;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
      font-weight: 500;
    }

    #toggleDetails:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
      box-shadow: none;
    }

    .hidden {
      display: none !important;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 0.3em 0.7em;
      font-size: 0.8em;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      vertical-align: baseline;
      border-radius: 6px;
      margin-left: 8px;
    }

    .badge-primary {
      background-color: rgba(66, 153, 225, 0.15);
      color: #4299e1;
      border: 1px solid rgba(66, 153, 225, 0.25);
    }

    .badge-success {
      background-color: rgba(72, 187, 120, 0.15);
      color: #48bb78;
      border: 1px solid rgba(72, 187, 120, 0.25);
    }

    .badge-danger {
      background-color: rgba(245, 101, 101, 0.15);
      color: #f56565;
      border: 1px solid rgba(245, 101, 101, 0.25);
    }

    .badge-warning {
      background-color: rgba(236, 201, 75, 0.15);
      color: #ecc94b;
      border: 1px solid rgba(236, 201, 75, 0.25);
    }

    .badge-secondary {
      background-color: rgba(160, 174, 192, 0.15);
      color: #a0aec0;
      border: 1px solid rgba(160, 174, 192, 0.25);
    }

    /* Details Panel */
    .detail-box {
      background-color: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
      text-align: left;
      font-size: 0.9em;
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding-bottom: 8px;
    }

    .detail-row:last-child {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }

    .detail-label {
      font-weight: 600;
      color: #a0aec0;
    }

    .detail-value {
      font-family: 'Courier New', monospace;
      color: #e2e8f0;
      font-weight: 500;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Floating log button & Terminal Log */
    .log-toggle-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(23, 25, 54, 0.85);
      color: #00f2fe;
      border: 1px solid rgba(0, 242, 254, 0.3);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 242, 254, 0.25);
      z-index: 999;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .log-toggle-btn:hover {
      background: #00f2fe;
      color: #0c0e1a;
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 6px 24px rgba(0, 242, 254, 0.45);
    }

    .log-container {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 420px;
      max-height: 380px;
      background: rgba(10, 11, 23, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      z-index: 1000;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease;
    }

    .log-header {
      background: rgba(255, 255, 255, 0.03);
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .log-header h4 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .btn-small {
      padding: 4px 10px;
      font-size: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-small:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    .log-content {
      max-height: 320px;
      overflow-y: auto;
      padding: 12px;
    }

    .log-entry {
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      border-left: 3px solid #718096;
      background: rgba(255, 255, 255, 0.01);
    }

    .log-entry.log-debug {
      background: rgba(255, 255, 255, 0.02);
      border-left-color: #718096;
      color: #a0aec0;
    }

    .log-entry.log-info {
      background: rgba(66, 153, 225, 0.05);
      border-left-color: #4299e1;
      color: #90cdf4;
    }

    .log-entry.log-azure-call {
      background: rgba(72, 187, 120, 0.05);
      border-left-color: #48bb78;
      color: #9ae6b4;
    }

    .log-entry.log-error {
      background: rgba(245, 101, 101, 0.05);
      border-left-color: #f56565;
      color: #feb2b2;
    }

    .log-time {
      font-weight: bold;
      color: rgba(255, 255, 255, 0.3);
      font-size: 9px;
      margin-bottom: 2px;
    }

    .log-level {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 3px;
      font-weight: bold;
      font-size: 8px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .log-level-debug { background: #4a5568; color: #e2e8f0; }
    .log-level-info { background: #2b6cb0; color: #ffffff; }
    .log-level-azure-call { background: #2f855a; color: #ffffff; }
    .log-level-error { background: #9b2c2c; color: #ffffff; }

    .log-message {
      font-weight: 500;
      word-break: break-all;
    }

    .log-data {
      margin-top: 6px;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .log-data pre {
      margin: 0;
      font-size: 9px;
      color: #cbd5e0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <div class="dashboard-card">
      <h2 id="title">🔄 Đang làm mới dữ liệu Power BI...</h2>

      <!-- Progress Bar -->
      <div class="progress-container hidden" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

  <!-- Form for manual input -->
  <div id="paramForm" class="hidden">
    <h3>Nhập thông tin làm mới</h3>
    <form id="refreshForm" method="post">
      <div class="form-group">
        <label for="groupId">Workspace ID (bắt buộc)</label>
        <input type="text" id="groupId" name="groupId" required>
      </div>
      <div class="form-group">
        <label for="dataflowId">Dataflow ID</label>
        <input type="text" id="dataflowId" name="dataflowId">
      </div>
      <div class="form-group">
        <label for="datasetId">Dataset ID</label>
        <input type="text" id="datasetId" name="datasetId">
      </div>
      <div class="form-group">
        <label for="requestId">Request ID (tùy chọn)</label>
        <input type="text" id="requestId" name="requestId">
      </div>
      <div class="form-group">
        <label for="apiBaseUrl">API Base URL (tùy chọn)</label>
        <input type="text" id="apiBaseUrl" name="apiBaseUrl" placeholder="https://pbirefresh.azurewebsites.net/api">
      </div>
      <button type="submit" class="btn btn-info">Bắt đầu làm mới</button>
    </form>
  </div>

  <div class="loader" id="loader"></div>
  <div id="status">Vui lòng chờ trong giây lát...</div>
  <div id="message"></div>
  <div id="timer"></div>
  <button id="toggleDetails" class="btn btn-info hidden">Hiển thị chi tiết</button>

  <!-- Log Toggle Button -->
  <button id="logToggleBtn" class="log-toggle-btn" title="Toggle Debug Logs">📋</button>

      <div id="details" class="detail-box">
        <div class="detail-row">
          <div class="detail-label">Request ID:</div>
          <div id="detail-requestId" class="detail-value"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Group ID:</div>
          <div id="detail-groupId" class="detail-value"></div>
        </div>
        <div class="detail-row" id="row-dataflowId">
          <div class="detail-label">Dataflow ID:</div>
          <div id="detail-dataflowId" class="detail-value"></div>
        </div>
        <div class="detail-row" id="row-datasetId">
          <div class="detail-label">Dataset ID:</div>
          <div id="detail-datasetId" class="detail-value"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Trạng thái:</div>
          <div id="detail-status" class="detail-value"></div>
        </div>
        <div class="detail-row">
          <div class="detail-label">Cập nhật lần cuối:</div>
          <div id="detail-lastUpdated" class="detail-value"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Helper to update progress bar smoothly
    function updateProgressBar(percentage) {
      const progressBar = document.getElementById("progressBar");
      if (progressBar) {
        progressBar.style.width = `${percentage}%`;
        if (percentage >= 100) {
          progressBar.style.background = "linear-gradient(90deg, #48bb78, #38a169)"; // Success green
          progressBar.style.boxShadow = "0 0 12px rgba(72, 187, 120, 0.4)";
        } else {
          progressBar.style.background = "linear-gradient(90deg, #00f2fe, #4facfe)"; // Working blue
          progressBar.style.boxShadow = "0 0 12px rgba(0, 242, 254, 0.4)";
        }
      }
    }

    function debugLog(message, data = null) {
      const timestamp = new Date().toLocaleTimeString();

      // Chỉ log những thông tin quan trọng
      const isImportantLog = message.includes('Status changed') ||
        message.includes('GetStatus response') ||
        message.includes('ERROR') ||
        message.includes('DETAILED GetStatus Analysis') ||
        message.includes('cleanup') ||
        message.includes('refresh completion');

      if (isImportantLog) {
        if (data) {
          console.log(`[DEBUG ${timestamp}]`, message, data);
        } else {
          console.log(`[DEBUG ${timestamp}]`, message);
        }

        // Thêm log vào UI nếu có log container
        addToLogDisplay(timestamp, 'DEBUG', message, data);
      }
    }

    // Enhanced logging cho Azure Functions calls
    function logAzureFunctionCall(type, url, options = {}) {
      const timestamp = new Date().toLocaleTimeString();
      const logData = {
        type: type,
        url: url,
        method: options.method || 'GET',
        timestamp: new Date().toISOString(),
        requestId: globalParams.requestId
      };

      console.log(`[AZURE-CALL ${timestamp}] ${type}:`, logData);
      addToLogDisplay(timestamp, 'AZURE-CALL', `${type}: ${url}`, logData);

      return logData;
    }

    // Log Azure Functions response
    function logAzureFunctionResponse(callData, response, responseTime, data = null) {
      const timestamp = new Date().toLocaleTimeString();
      const logData = {
        ...callData,
        responseTime: responseTime + 'ms',
        status: response.status,
        statusText: response.statusText,
        ok: response.ok,
        responseData: data
      };

      const logLevel = response.ok ? 'INFO' : 'ERROR';
      console.log(`[AZURE-RESPONSE ${timestamp}] ${callData.type}:`, logData);
      addToLogDisplay(timestamp, logLevel, `${callData.type} Response: ${response.status}`, logData);

      return logData;
    }

    // Enhanced error handler để filter Chrome DevTools noise
    function shouldIgnoreError(error, url) {
      // Ignore Chrome DevTools related requests
      if (url && (
        url.includes('.well-known/appspecific') ||
        url.includes('chrome-extension://') ||
        url.includes('devtools') ||
        url.includes('favicon.ico')
      )) {
        return true;
      }

      // Ignore common browser noise
      if (error && error.message && (
        error.message.includes('chrome-extension') ||
        error.message.includes('devtools') ||
        error.message.includes('favicon') ||
        error.message.includes('well-known')
      )) {
        return true;
      }

      return false;
    }

    // Enhanced logError với filtering
    function logError(operation, error, context = {}) {
      // Filter out noise errors
      if (shouldIgnoreError(error, context.url || context.statusUrl || context.triggerUrl)) {
        return; // Don't log Chrome DevTools noise
      }

      const timestamp = new Date().toLocaleTimeString();
      const logData = {
        operation: operation,
        error: error.message,
        stack: error.stack,
        context: context,
        timestamp: new Date().toISOString(),
        requestId: globalParams.requestId
      };

      console.error(`[ERROR ${timestamp}] ${operation}:`, logData);
      addToLogDisplay(timestamp, 'ERROR', `${operation}: ${error.message}`, logData);

      return logData;
    }

    // Thêm log vào UI display
    function addToLogDisplay(timestamp, level, message, data = null) {
      let logContainer = document.getElementById('logContainer');
      if (!logContainer) {
        // Tạo log container nếu chưa có
        logContainer = document.createElement('div');
        logContainer.id = 'logContainer';
        logContainer.className = 'log-container hidden';
        logContainer.innerHTML = `
          <div class="log-header">
            <h4>🔍 Debug Logs</h4>
            <button id="clearLogs" class="btn-small">Clear</button>
          </div>
          <div id="logContent" class="log-content"></div>
        `;
        document.body.appendChild(logContainer);

        // Add clear logs functionality
        document.getElementById('clearLogs').addEventListener('click', () => {
          document.getElementById('logContent').innerHTML = '';
        });
      }

      const logContent = document.getElementById('logContent');
      const logEntry = document.createElement('div');
      logEntry.className = `log-entry log-${level.toLowerCase()}`;

      let logText = `[${timestamp}] ${level}: ${message}`;
      if (data && typeof data === 'object') {
        logText += `\n${JSON.stringify(data, null, 2)}`;
      }

      logEntry.innerHTML = `
        <div class="log-time">${timestamp}</div>
        <div class="log-level log-level-${level.toLowerCase()}">${level}</div>
        <div class="log-message">${message}</div>
        ${data ? `<div class="log-data"><pre>${JSON.stringify(data, null, 2)}</pre></div>` : ''}
      `;

      logContent.appendChild(logEntry);

      // Auto scroll to bottom
      logContent.scrollTop = logContent.scrollHeight;

      // Limit log entries (keep last 50)
      const entries = logContent.querySelectorAll('.log-entry');
      if (entries.length > 50) {
        entries[0].remove();
      }
    }

    // Toggle log display
    function toggleLogDisplay() {
      const logContainer = document.getElementById('logContainer');
      if (logContainer) {
        logContainer.classList.toggle('hidden');
      }
    }

    // Detect environment và set API URL
    function detectEnvironmentAndSetApiUrl() {
      const hostname = window.location.hostname;

      // PRODUCTION URLS - CẬP NHẬT SAU KHI DEPLOY AZURE FUNCTIONS
      const PRODUCTION_API_URLS = [
        // Thêm Azure Functions URL của bạn vào đây sau khi deploy
        // 'https://your-function-app-name.azurewebsites.net/api',
        'https://pbirefresh-app.azurewebsites.net/api',  // Default fallback
      ];

      // Github Pages hosting - use first production URL
      if (hostname.includes('github.io')) {
        return PRODUCTION_API_URLS[0];
      }

      // Azure Static Web Apps hosting
      if (hostname.includes('azurestaticapps.net')) {
        return PRODUCTION_API_URLS[0];
      }

      // Azure Web Apps hosting (nếu host cả frontend và backend trên Azure)
      if (hostname.includes('azurewebsites.net')) {
        // Nếu đây là backend Azure Functions, sử dụng local API
        if (window.location.pathname.includes('/api/')) {
          return `${window.location.protocol}//${hostname}/api`;
        }
        // Nếu đây là frontend trên Azure Web Apps, sử dụng production API
        return PRODUCTION_API_URLS[0];
      }

      // Local development environments
      if (hostname === 'localhost' || hostname === '127.0.0.1') {
        return `${window.location.protocol}//${hostname}:7071/api`;
      }

      // File protocol (local file) - development
      if (hostname === '' && window.location.protocol === 'file:') {
        return 'http://localhost:7071/api';
      }

      // Custom domains hoặc other hosting - sử dụng production
      return PRODUCTION_API_URLS[0];
    }

    // Global parameters
    let globalParams = {
      groupId: null,
      dataflowId: null,
      datasetId: null,
      requestId: null,
      autoClose: false,
      showDetails: false,
      apiBaseUrl: detectEnvironmentAndSetApiUrl()
    };

    // State variables
    let hasDataflow = false;
    let hasDataset = false;
    let isRefreshCompleted = false;
    let refreshFailed = false;
    let pollTimeoutId = null;
    let triggerUrl = "";
    let statusUrl = "";
    let currentStatus = "";
    let previousStatus = ""; // Track previous status để detect changes
    let previousDataflowStatus = "";
    let previousDatasetStatus = "";
    let monitorCount = 0;
    let timerInterval = null;

    // Generate unique request ID
    function generateRequestId() {
      const timestamp = Date.now();
      const randomPart = Math.random().toString(36).substring(2, 9);
      return `req_${timestamp}_${randomPart}`;
    }

    // Validate GUID format
    function isValidGuid(guid) {
      if (!guid) return false;
      const guidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      return guidRegex.test(guid);
    }

    // Create status badge
    function createStatusBadge(status) {
      if (!status) return '';

      let badgeClass = 'badge-secondary';
      if (status.includes('Completed') || status.includes('Success')) {
        badgeClass = 'badge-success';
      } else if (status.includes('Failed') || status.includes('Timeout')) {
        badgeClass = 'badge-danger';
      } else if (status.includes('Refreshing')) {
        badgeClass = 'badge-primary';
      } else if (status.includes('Waiting')) {
        badgeClass = 'badge-warning';
      }

      return `<span class="badge ${badgeClass}">${status}</span>`;
    }

    // Initialize application
    async function init() {
      debugLog("Khởi tạo ứng dụng (version 2.1.1 - FIXED)...");

      // Get parameters from URL
      const urlParams = new URLSearchParams(window.location.search);

      // FIXED: Support both old and new parameter formats
      globalParams.groupId = urlParams.get("groupId") || urlParams.get("groupIdForRefreshDataflow") || null;
      globalParams.dataflowId = urlParams.get("dataflowId") || urlParams.get("dataflowIdForRefreshDataflow") || null;
      globalParams.datasetId = urlParams.get("datasetId") || urlParams.get("datasetIdForRefreshDataflow") || null;
      globalParams.requestId = urlParams.get("requestId") || generateRequestId();
      globalParams.autoClose = urlParams.get("autoClose") === "true";
      globalParams.showDetails = urlParams.get("showDetails") === "true";
      globalParams.apiBaseUrl = urlParams.get("apiBaseUrl") || detectEnvironmentAndSetApiUrl();

      debugLog("Tham số khởi tạo:", globalParams);

      // Validate required parameters
      const hasRequiredParams = globalParams.groupId && (globalParams.dataflowId || globalParams.datasetId);

      let validationErrors = [];
      if (globalParams.groupId && !isValidGuid(globalParams.groupId)) {
        validationErrors.push("Workspace ID không đúng định dạng GUID");
      }
      if (globalParams.dataflowId && !isValidGuid(globalParams.dataflowId)) {
        validationErrors.push("Dataflow ID không đúng định dạng GUID");
      }
      if (globalParams.datasetId && !isValidGuid(globalParams.datasetId)) {
        validationErrors.push("Dataset ID không đúng định dạng GUID");
      }

      if (!hasRequiredParams || validationErrors.length > 0) {
        showParameterForm(validationErrors);
        return;
      }

      // Start refresh process
      startRefresh();
    }

    // Show parameter input form
    function showParameterForm(errors = []) {
      document.getElementById("loader").style.display = "none";
      document.getElementById("status").textContent = errors.length > 0
        ? `Lỗi: ${errors.join(", ")}`
        : "Vui lòng nhập thông tin để bắt đầu làm mới Power BI";
      document.getElementById("timer").style.display = "none";
      document.getElementById("paramForm").classList.remove("hidden");
      document.getElementById("title").textContent = "Power BI Refresh Tool";

      // Fill existing values
      if (globalParams.groupId) document.getElementById("groupId").value = globalParams.groupId;
      if (globalParams.dataflowId) document.getElementById("dataflowId").value = globalParams.dataflowId;
      if (globalParams.datasetId) document.getElementById("datasetId").value = globalParams.datasetId;

      // Handle form submission
      document.getElementById("refreshForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const form = e.target;
        globalParams.groupId = form.elements["groupId"].value;
        globalParams.dataflowId = form.elements["dataflowId"].value || null;
        globalParams.datasetId = form.elements["datasetId"].value || null;
        globalParams.requestId = form.elements["requestId"].value || generateRequestId();
        globalParams.apiBaseUrl = form.elements["apiBaseUrl"].value || detectEnvironmentAndSetApiUrl();

        // Validate
        let formErrors = [];
        if (!globalParams.groupId) {
          formErrors.push("Workspace ID là bắt buộc");
        } else if (!isValidGuid(globalParams.groupId)) {
          formErrors.push("Workspace ID không đúng định dạng GUID");
        }

        if (!globalParams.groupId || (!globalParams.dataflowId && !globalParams.datasetId)) {
          formErrors.push("Vui lòng nhập Workspace ID và ít nhất một trong Dataflow ID hoặc Dataset ID");
        }

        if (formErrors.length > 0) {
          alert(formErrors.join("\n"));
          return;
        }

        // Hide form and start refresh
        document.getElementById("paramForm").classList.add("hidden");
        document.getElementById("loader").style.display = "block";
        document.getElementById("timer").style.display = "block";
        document.getElementById("title").textContent = "🔄 Đang làm mới dữ liệu Power BI...";

        startRefresh();
      });
    }

    // Start refresh process
    function startRefresh() {
      hasDataflow = Boolean(globalParams.dataflowId);
      hasDataset = Boolean(globalParams.datasetId);

      debugLog("🚀 Starting refresh process", {
        hasDataflow: hasDataflow,
        hasDataset: hasDataset,
        requestId: globalParams.requestId
      });

      // Create API URLs - FIXED: Use GetStatus instead of CheckRefreshStatus
      triggerUrl = `${globalParams.apiBaseUrl}/TriggerRefresh?groupId=${globalParams.groupId}&dataflowId=${globalParams.dataflowId || ''}&datasetId=${globalParams.datasetId || ''}&requestId=${globalParams.requestId}`;
      statusUrl = `${globalParams.apiBaseUrl}/GetStatus?requestId=${globalParams.requestId}`;

      document.getElementById("progressContainer").classList.remove("hidden");
      updateProgressBar(5);

      // Update UI
      document.getElementById('row-dataflowId').style.display = hasDataflow ? 'flex' : 'none';
      document.getElementById('row-datasetId').style.display = hasDataset ? 'flex' : 'none';

      document.getElementById('detail-groupId').textContent = globalParams.groupId;
      document.getElementById('detail-dataflowId').textContent = globalParams.dataflowId || 'N/A';
      document.getElementById('detail-datasetId').textContent = globalParams.datasetId || 'N/A';

      if (globalParams.showDetails) {
        document.getElementById('details').style.display = 'block';
      } else {
        document.getElementById('toggleDetails').classList.remove('hidden');
      }

      document.getElementById('toggleDetails').addEventListener('click', function () {

        if (detailsBox.style.display === 'block') {

          this.textContent = 'Hiển thị chi tiết';
        } else {
          detailsBox.style.display = 'block';
          this.textContent = 'Ẩn chi tiết';
        }
      });

      startTimer();
      triggerRefreshAndStartMonitoring();
    }

    // Trigger refresh and start monitoring in parallel
    async function triggerRefreshAndStartMonitoring() {
      debugLog("🚀 Starting parallel refresh & monitoring");

      document.getElementById("status").textContent = "🚀 Đang gửi yêu cầu làm mới dữ liệu...";
      document.getElementById("message").textContent = "Kết nối đến Azure Functions...";

      updateProgressBar(15);

      // Bắt đầu status monitoring NGAY LẬP TỨC (không chờ TriggerRefresh)
      startStatusMonitoring();

      // Gọi TriggerRefresh song song (không chờ response)
      triggerRefreshInBackground();
    }

    // Trigger refresh in background (không block UI)
    async function triggerRefreshInBackground() {
      try {
        // Log Azure Function call
        const callStartTime = performance.now();
        const callData = logAzureFunctionCall('TriggerRefresh', triggerUrl, { method: 'GET' });

        const response = await fetch(triggerUrl, {
          method: 'GET',
          cache: 'no-store'
        });

        const responseTime = Math.round(performance.now() - callStartTime);

        let responseData = {};
        let responseText = '';

        try {
          responseText = await response.text();
          if (responseText && responseText.trim().length > 0) {
            responseData = JSON.parse(responseText);
          }
        } catch (parseError) {
          responseData = { rawResponse: responseText };
        }

        // Log Azure Function response
        logAzureFunctionResponse(callData, response, responseTime, responseData);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${responseText}`);
        }

        // Update UI với thông báo trigger thành công (không thay đổi monitoring)
        if (!isRefreshCompleted) {
          document.getElementById("message").textContent = responseData.message || "✅ Đã gửi yêu cầu thành công, đang theo dõi...";
        }

      } catch (error) {
        logError("TriggerRefresh", error, {
          triggerUrl,
          requestId: globalParams.requestId,
          groupId: globalParams.groupId
        });

        // Nếu TriggerRefresh thất bại, vẫn tiếp tục monitoring (có thể refresh đã bắt đầu từ trước)
        if (!isRefreshCompleted) {
          document.getElementById("message").textContent = `⚠️ Lỗi trigger: ${error.message}. Vẫn đang theo dõi trạng thái...`;
        }
      }
    }

    // Start status monitoring immediately
    async function startStatusMonitoring() {
      document.getElementById("status").textContent = "⏳ Đang theo dõi trạng thái...";
      document.getElementById("message").textContent = "Kiểm tra tiến trình làm mới (song song với trigger)...";

      updateProgressBar(30);

      // Bắt đầu monitoring NGAY LẬP TỨC (chỉ chờ 1 giây để UI cập nhật)
      setTimeout(monitorStatus, 1000); // Giảm từ 3s xuống 1s
    }

    // Monitor status loop
    async function monitorStatus() {
      if (isRefreshCompleted || monitorCount >= 300) {
        debugLog("Kết thúc monitoring");
        return;
      }

      monitorCount++;
      debugLog(`📊 GetStatus check #${monitorCount}`, { statusUrl, attempt: monitorCount });

      try {
        // Log Azure Function call
        const callStartTime = performance.now();
        const callData = logAzureFunctionCall('GetStatus', statusUrl, { method: 'GET' });

        const response = await fetch(statusUrl, {
          method: 'GET',
          cache: 'no-store'
        });

        const responseTime = Math.round(performance.now() - callStartTime);
        debugLog(`GetStatus response: ${response.status} (${responseTime}ms)`);

        if (response.status === 404) {
          // Log 404 as info, không phải error
          logAzureFunctionResponse(callData, response, responseTime, { message: "Status chưa có sẵn" });
          document.getElementById("message").textContent = `Đang khởi tạo (${monitorCount})...`;
          pollTimeoutId = setTimeout(monitorStatus, 10000); // Giữ 10s cho 404
          return;
        }

        let data = null;
        if (response.ok) {
          try {
            data = await response.json();

            // ENHANCED DEBUG: Log exact field values từ server - CHỈ KHI CẦN
            if (monitorCount <= 3 || data.status !== previousStatus) {
              debugLog("🔍 DETAILED GetStatus Analysis:", {
                "Raw data.status": data.status,
                "Raw data.dataflowStatus": data.dataflowStatus,
                "Raw data.datasetStatus": data.datasetStatus,
                "Raw data.message": data.message,
                "Raw data.isCompleted": data.isCompleted,
                "Type of data.status": typeof data.status,
                "Status is truthy": !!data.status,
                "Status !== 'Waiting'": data.status !== 'Waiting'
              });
            }

          } catch (parseError) {
            logError("ParseGetStatusResponse", parseError, {
              statusUrl,
              responseStatus: response.status,
              attempt: monitorCount
            });
            throw new Error(`Không thể parse JSON response: ${parseError.message}`);
          }
        }

        // Log Azure Function response
        logAzureFunctionResponse(callData, response, responseTime, data);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        // Check for status changes và cập nhật UI ngay lập tức
        const hasStatusChanged = detectAndHandleStatusChange(data);

        // Update status display (always update cho latest info)
        updateStatusDisplay(data);

        // Calculate progress dynamically
        let currentProgress = 30;
        if (data) {
          const isDataflowDone = data.dataflowStatus && (data.dataflowStatus.includes('Completed') || data.dataflowStatus.includes('Success') || data.dataflowStatus.includes('Error'));
          const isDatasetDone = data.datasetStatus && (data.datasetStatus.includes('Completed') || data.datasetStatus.includes('Success') || data.datasetStatus.includes('Error'));
          
          if (hasDataflow && hasDataset) {
            if (isDataflowDone) {
              if (isDatasetDone) {
                currentProgress = 100;
              } else {
                currentProgress = 70 + Math.min(25, monitorCount * 0.5);
              }
            } else {
              currentProgress = 30 + Math.min(35, monitorCount * 1);
            }
          } else if (hasDataflow) {
            if (isDataflowDone) {
              currentProgress = 100;
            } else {
              currentProgress = 30 + Math.min(65, monitorCount * 2);
            }
          } else if (hasDataset) {
            if (isDatasetDone) {
              currentProgress = 100;
            } else {
              currentProgress = 30 + Math.min(65, monitorCount * 2);
            }
          }
        }
        updateProgressBar(currentProgress);

        // Log brief summary nếu có status change
        if (hasStatusChanged) {
          debugLog("🔄 Status đã được cập nhật trong UI");
        }

        // Check if completed - CHỈ CLEANUP KHI TẤT CẢ ĐÃ COMPLETE
        const isAllCompleted = checkIfAllRefreshCompleted(data);

        if (isAllCompleted) {
          debugLog("🎯 Refresh completion detected", {
            finalStatus: data.status,
            attempts: monitorCount,
            isCompleted: data.isCompleted,
            dataflowStatus: data.dataflowStatus,
            datasetStatus: data.datasetStatus,
            hasDataflow: hasDataflow,
            hasDataset: hasDataset
          });

          isRefreshCompleted = true;

          // Update final UI state
          const hasFailed = data.status && (data.status.includes('Failed') || data.status.includes('Error'));
          document.getElementById("title").textContent = hasFailed ? "❌ Làm mới thất bại!" : "✅ Làm mới hoàn tất!";

          updateProgressBar(100);

          // Perform cleanup
          performCleanup();

          // Auto close if configured
          if (globalParams.autoClose && !hasFailed) {
            setTimeout(() => window.close(), 3000);
          }
          return;
        }

        // Continue monitoring với 30s interval
        pollTimeoutId = setTimeout(monitorStatus, 30000); // Tăng từ 15s lên 30s

      } catch (error) {
        logError("MonitorStatus", error, {
          statusUrl,
          attempt: monitorCount,
          requestId: globalParams.requestId
        });

        // Handle eTag mismatch errors (409 Conflict) from SharePoint
        if (error.message.includes('409') ||
          error.message.includes('eTag mismatch') ||
          error.message.includes('resourceModified') ||
          error.message.includes('resource has changed')) {
          debugLog("Phát hiện lỗi eTag mismatch SharePoint, tự động retry...");
          document.getElementById("message").textContent = `⚠️ SharePoint đang được cập nhật đồng thời, đang thử lại... (${monitorCount})`;

          // Retry với delay ngắn hơn cho eTag conflicts
          if (monitorCount < 300) {
            pollTimeoutId = setTimeout(monitorStatus, 5000); // Giữ 5s cho eTag conflicts
          }
          return;
        }

        document.getElementById("message").textContent = `Lỗi khi kiểm tra trạng thái: ${error.message}`;

        // Retry after delay - tăng error retry lên 30s
        if (monitorCount < 300) {
          pollTimeoutId = setTimeout(monitorStatus, 30000); // Tăng từ 20s lên 30s
        }
      }
    }

    // Update status display - SIMPLIFIED VERSION - CHỈ HIỂN THỊ STATUS HIỆN TẠI
    function updateStatusDisplay(data) {
      // Debug log để kiểm tra data nhận được
      debugLog("updateStatusDisplay received data:", {
        status: data.status,
        dataflowStatus: data.dataflowStatus,
        datasetStatus: data.datasetStatus,
        message: data.message,
        hasDataflow: hasDataflow,
        hasDataset: hasDataset,
        isCompleted: data.isCompleted
      });

      let statusText = "";
      let messageText = data.message || "Đang xử lý...";

      // LOGIC ĐƠN GIẢN: CHỈ HIỂN THỊ STATUS HIỆN TẠI
      if (data.status) {
        // Nếu có specific status active (không phải Waiting), hiển thị exact đó
        if (data.dataflowStatus && data.dataflowStatus !== 'Waiting' && data.dataflowStatus !== '') {
          // Đang process dataflow - chỉ hiển thị dataflow
          statusText = `Dataflow: ${createStatusBadge(data.dataflowStatus)}`;
        } else if (data.datasetStatus && data.datasetStatus !== 'Waiting' && data.datasetStatus !== '') {
          // Đang process dataset - chỉ hiển thị dataset  
          statusText = `Dataset: ${createStatusBadge(data.datasetStatus)}`;
        } else {
          // Fallback: hiển thị main status với type label nếu có
          if (hasDataflow && !hasDataset) {
            // Chỉ có dataflow
            statusText = `Dataflow: ${createStatusBadge(data.status)}`;
          } else if (hasDataset && !hasDataflow) {
            // Chỉ có dataset
            statusText = `Dataset: ${createStatusBadge(data.status)}`;
          } else if (hasDataflow && hasDataset) {
            // Có cả hai - hiển thị main status với label general
            statusText = `Status: ${createStatusBadge(data.status)}`;
          } else {
            // Không có specific type
            statusText = createStatusBadge(data.status);
          }
        }
      } else {
        // Fallback nếu không có status
        statusText = "Đang chờ thông tin...";
      }

      // Cập nhật UI elements
      document.getElementById("status").innerHTML = statusText;
      document.getElementById("message").textContent = messageText;
      document.getElementById("detail-status").innerHTML = statusText;

      // Cập nhật lastUpdated nếu có
      if (data.lastUpdated) {
        document.getElementById('detail-lastUpdated').textContent = new Date(data.lastUpdated).toLocaleString();
      }

      // Log kết quả để debug
      debugLog("Status display updated:", {
        statusText: statusText,
        messageText: messageText,
        actualStatusFromServer: data.status,
        dataflowStatusFromServer: data.dataflowStatus,
        datasetStatusFromServer: data.datasetStatus
      });
    }

    // Start timer
    function startTimer() {
      let seconds = 0;
      const timerEl = document.getElementById("timer");

      if (timerInterval) {
        clearInterval(timerInterval);
      }

      timerInterval = setInterval(() => {
        seconds++;
        timerEl.textContent = `⏱ Đã chờ: ${Math.floor(seconds / 60)} phút ${seconds % 60} giây`;
      }, 1000);
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (pollTimeoutId) clearTimeout(pollTimeoutId);
      if (timerInterval) clearInterval(timerInterval);
    });

    // Global error handlers để filter noise
    window.addEventListener('error', function (event) {
      // Filter out Chrome DevTools và browser noise
      if (shouldIgnoreError(event.error, event.filename)) {
        event.preventDefault(); // Prevent console spam
        return;
      }

      // Log only important errors
      logError('GlobalError', event.error, {
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno
      });
    });

    window.addEventListener('unhandledrejection', function (event) {
      // Filter out Chrome DevTools noise
      if (event.reason && shouldIgnoreError(event.reason, '')) {
        event.preventDefault();
        return;
      }

      logError('UnhandledPromiseRejection', event.reason, {
        type: 'promise_rejection'
      });
    });

    // Initialize when DOM ready
    document.addEventListener('DOMContentLoaded', init);

    // Initialize log system
    document.addEventListener('DOMContentLoaded', function () {
      // Add log toggle functionality
      const logToggleBtn = document.getElementById('logToggleBtn');
      if (logToggleBtn) {
        logToggleBtn.addEventListener('click', toggleLogDisplay);
      }

      // Initial log entry
      debugLog("Application initialized", {
        version: "2.1.1 - FIXED",
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        url: window.location.href
      });
    });

    // Detect status changes và trigger immediate UI updates - SIMPLIFIED
    function detectAndHandleStatusChange(data) {
      let hasChanged = false;

      // Debug current vs previous
      debugLog("detectAndHandleStatusChange checking:", {
        currentStatus: data.status,
        previousStatus: previousStatus,
        currentDataflowStatus: data.dataflowStatus,
        previousDataflowStatus: previousDataflowStatus,
        currentDatasetStatus: data.datasetStatus,
        previousDatasetStatus: previousDatasetStatus
      });

      // Check main status change (most important)
      if (data.status && data.status !== previousStatus) {
        hasChanged = true;
        debugLog(`📊 Main Status changed: "${previousStatus}" → "${data.status}"`);

        // Update message dựa trên status
        if (data.status.toLowerCase().includes('refreshing') || data.status.toLowerCase().includes('running')) {
          document.getElementById("message").textContent = "🔄 Đang thực hiện refresh...";
        } else if (data.status.toLowerCase().includes('completed') || data.status.toLowerCase().includes('success')) {
          document.getElementById("message").textContent = "✅ Refresh hoàn tất!";
        } else if (data.status.toLowerCase().includes('failed') || data.status.toLowerCase().includes('error')) {
          document.getElementById("message").textContent = "❌ Refresh thất bại!";
        } else if (data.status.toLowerCase().includes('waiting')) {
          document.getElementById("message").textContent = "⏳ Đang chờ xử lý...";
        }

        previousStatus = data.status;
      }

      // Check dataflow status change
      if (data.dataflowStatus && data.dataflowStatus !== previousDataflowStatus) {
        hasChanged = true;
        debugLog(`📊 Dataflow status changed: "${previousDataflowStatus}" → "${data.dataflowStatus}"`);
        previousDataflowStatus = data.dataflowStatus;
      }

      // Check dataset status change
      if (data.datasetStatus && data.datasetStatus !== previousDatasetStatus) {
        hasChanged = true;
        debugLog(`📊 Dataset status changed: "${previousDatasetStatus}" → "${data.datasetStatus}"`);
        previousDatasetStatus = data.datasetStatus;
      }

      // Trigger visual feedback nếu có change
      if (hasChanged) {
        debugLog("🔄 Status change detected - triggering visual feedback");

        // Visual indicator
        const statusElement = document.getElementById("status");
        if (statusElement) {
          statusElement.style.transition = "all 0.3s ease";
          statusElement.style.transform = "scale(1.02)";
          statusElement.style.boxShadow = "0 0 10px rgba(40, 167, 69, 0.3)";

          setTimeout(() => {
            statusElement.style.transform = "scale(1)";
            statusElement.style.boxShadow = "none";
          }, 500);
        }

        // Log the change
        addToLogDisplay(new Date().toLocaleTimeString(), 'INFO', 'Status Change Detected', {
          previous: {
            main: previousStatus,
            dataflow: previousDataflowStatus,
            dataset: previousDatasetStatus
          },
          current: {
            main: data.status,
            dataflow: data.dataflowStatus,
            dataset: data.datasetStatus
          },
          monitorAttempt: monitorCount
        });
      } else {
        debugLog("No status changes detected this cycle");
      }

      return hasChanged;
    }

    // Cleanup function khi refresh hoàn tất
    function performCleanup() {
      debugLog("🧹 Performing cleanup after refresh completion");

      // Clear all timers
      if (pollTimeoutId) {
        clearTimeout(pollTimeoutId);
        pollTimeoutId = null;
      }

      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }

      // Stop monitoring
      isRefreshCompleted = true;

      // Update UI elements
      document.querySelector(".loader").style.display = "none";

      debugLog("✅ Cleanup completed - all timers cleared");
    }

    // Check if all components are completed
    function checkIfAllRefreshCompleted(data) {
      // Nếu server báo isCompleted = true, trust server
      if (data.isCompleted === true) {
        return true;
      }

      // Check status strings cho completion/failure
      const mainStatusCompleted = data.status && (
        data.status.includes('Completed') ||
        data.status.includes('Failed') ||
        data.status.includes('Success') ||
        data.status.includes('Error')
      );

      // Nếu chỉ có dataflow
      if (hasDataflow && !hasDataset) {
        const dataflowCompleted = data.dataflowStatus && (
          data.dataflowStatus.includes('Completed') ||
          data.dataflowStatus.includes('Failed') ||
          data.dataflowStatus.includes('Success') ||
          data.dataflowStatus.includes('Error')
        );
        return dataflowCompleted || mainStatusCompleted;
      }

      // Nếu chỉ có dataset  
      if (hasDataset && !hasDataflow) {
        const datasetCompleted = data.datasetStatus && (
          data.datasetStatus.includes('Completed') ||
          data.datasetStatus.includes('Failed') ||
          data.datasetStatus.includes('Success') ||
          data.datasetStatus.includes('Error')
        );
        return datasetCompleted || mainStatusCompleted;
      }

      // Nếu có cả dataflow và dataset
      if (hasDataflow && hasDataset) {
        const dataflowCompleted = data.dataflowStatus && (
          data.dataflowStatus.includes('Completed') ||
          data.dataflowStatus.includes('Failed') ||
          data.dataflowStatus.includes('Success') ||
          data.dataflowStatus.includes('Error')
        );

        const datasetCompleted = data.datasetStatus && (
          data.datasetStatus.includes('Completed') ||
          data.datasetStatus.includes('Failed') ||
          data.datasetStatus.includes('Success') ||
          data.datasetStatus.includes('Error')
        );

        // CẢ HAI phải complete mới được cleanup
        return (dataflowCompleted && datasetCompleted) || mainStatusCompleted;
      }

      // Fallback: chỉ dựa vào main status
      return mainStatusCompleted;
    }
  </script>
</body>
